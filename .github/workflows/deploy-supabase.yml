name: Deploy Supabase migrations

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Validate and deploy migrations
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test -n "$SUPABASE_PROJECT_REF"

      - name: Link production project
        shell: bash
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Preview pending migrations
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked --dry-run

      - name: Apply pending migrations
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked

      - name: Verify migration history
        shell: bash
        run: |
          set -euo pipefail
          supabase migration list --linked
